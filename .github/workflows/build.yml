name: Build

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - run: mvn clean package -DskipTests
      - uses: actions/upload-artifact@v4
        with:
          name: BeiDou.jar
          path: gms-server/target/*.jar
